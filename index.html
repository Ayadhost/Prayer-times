<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أوقات الصلاة في بغداد</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <style>
        body {
            font-family: 'Arial', sans-serif;
            text-align: center;
            background-color: #1c1c1c;
            color: #ffffff;
            margin: 0;
            padding: 0;
        }
        h1 {
            margin: 20px 0;
            font-size: 2.5rem;
        }
        #current-date-time {
            font-size: 1.4rem;
            color: #bbbbbb;
            margin-bottom: 30px;
        }
        table {
            width: 70%;
            margin: 40px auto;
            border-collapse: collapse;
            background-color: #333;
            box-shadow: 0 4px 8px rgba(255, 255, 255, 0.2);
        }
        th, td {
            padding: 20px;
            text-align: center;
            border-bottom: 1px solid #444;
            font-size: 1.6rem;
            color: #ffffff;
        }
        td {
            position: relative;
            margin: 10px 0;
            background-color: #2c2c2c;
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            transition: transform 0.2s ease;
        }
        td:hover {
            transform: scale(1.05);
        }
        .icon {
            font-size: 2.5rem;
            color: #4CAF50;
        }
        td:last-child {
            color: #f0f0f0;
        }
    </style>
</head>
<body>

<h1>أوقات الصلاة في بغداد</h1>
<div id="current-date-time"></div> <!-- حقل عرض التاريخ والوقت -->

<table>
    <tr>
        <td class="icon">🕒</td>
        <td>الغروب</td>
        <td id="sunset-time"></td>
        <td>مساءً</td>
    </tr>
    <tr>
        <td class="icon">🕒</td>
        <td>المغرب</td>
        <td id="maghrib-time"></td>
        <td>مساءً</td>
    </tr>
    <tr>
        <td class="icon">🕒</td>
        <td>العشاء</td>
        <td id="isha-time"></td>
        <td>مساءً</td>
    </tr>
    <tr>
        <td class="icon">🕒</td>
        <td>الفجر</td>
        <td id="fajr-time"></td>
        <td>صباحًا</td>
    </tr>
    <tr>
        <td class="icon">🕒</td>
        <td>الظهر</td>
        <td id="dhuhr-time"></td>
        <td>صباحًا</td>
    </tr>
</table>

<script src="script.js"></script>
</body>
</html>
