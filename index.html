<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أوقات الصلاة في بغداد</title>
    <link rel="icon" href="favicon.png" type="image/png">
    <style>
        body {
            font-family: 'Arial', sans-serif;
            text-align: center;
            background-color: #1c1c1c;
            color: #ffffff;
            margin: 0;
            padding: 0;
        }
        h1 {
            margin: 20px 0;
            font-size: 2.5rem;
        }
        #current-date-time {
            font-size: 2rem; /* تكبير الخط */
            color: #bbbbbb;
            margin-bottom: 30px;
        }
        table {
            width: 70%;
            margin: 40px auto;
            border-collapse: collapse;
            background-color: #333;
            box-shadow: 0 4px 8px rgba(255, 255, 255, 0.2);
        }
        th, td {
            padding: 20px;
            text-align: center;
            border-bottom: 1px solid #444;
            font-size: 1.6rem;
            color: #ffffff;
        }
        td {
            position: relative;
            margin: 10px 0;
            background-color: #2c2c2c;
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            transition: transform 0.2s ease;
        }
        td:hover {
            transform: scale(1.05);
        }
        .icon {
            font-size: 2.5rem;
            color: #4CAF50;
        }
        td:last-child {
            color: #f0f0f0;
        }

        /* Media Query للهواتف لتوسيع المساحة وتقليل حجم النص */
        @media (max-width: 600px) {
            table {
                width: 90%; /* زيادة عرض الجدول */
            }
            th, td {
                font-size: 1.4rem; /* تقليل حجم النص قليلاً */
                padding: 15px; /* تقليل الحواف */
            }
            .icon {
                font-size: 2rem; /* تقليل حجم الأيقونات */
            }
        }
    </style>
</head>
<body>

<h1>أوقات الصلاة في بغداد</h1>
<div id="current-date-time"></div> <!-- حقل عرض الوقت الفعلي -->

<table>
    <tr>
        <td class="icon">🕒</td>
        <td>الفجر</td>
        <td id="fajr-time"></td>
    </tr>
    <tr>
        <td class="icon">🕒</td>
        <td>الشروق</td>
        <td id="sunrise-time"></td>
    </tr>
    <tr>
        <td class="icon">🕒</td>
        <td>الظهر</td>
        <td id="dhuhr-time"></td>
    </tr>
    <tr>
        <td class="icon">🕒</td>
        <td>الغروب</td>
        <td id="maghrib-time"></td>
    </tr>
    <tr>
        <td class="icon">🕒</td>
        <td>العشاء</td>
        <td id="isha-time"></td>
    </tr>
</table>

<script src="adhan.umd.min.js"></script>
<script>
    document.addEventListener("DOMContentLoaded", function() {
        const coordinates = new adhan.Coordinates(33.3152, 44.3661); // إحداثيات بغداد

        // إعدادات حساب الصلاة مع الزوايا
        const params = adhan.CalculationMethod.Other(); 
        params.fajrAngle = 18; // زاوية الفجر للمذهب الجعفري
        params.ishaAngle = 4; // زاوية العشاء للمذهب الجعفري

        const date = new Date();
        const prayerTimes = new adhan.PrayerTimes(coordinates, date, params);

        // تحويل الأرقام إلى الأرقام الهندية
        function toArabicNumbers(num) {
            return num.replace(/\d/g, d => "٠١٢٣٤٥٦٧٨٩"[d]);
        }

        // عرض أوقات الصلاة في العناصر المناسبة
        document.getElementById("fajr-time").textContent = toArabicNumbers(formatTime(prayerTimes.fajr));
        document.getElementById("sunrise-time").textContent = toArabicNumbers(formatTime(prayerTimes.sunrise));
        document.getElementById("dhuhr-time").textContent = toArabicNumbers(formatTime(prayerTimes.dhuhr));
        document.getElementById("maghrib-time").textContent = toArabicNumbers(formatTime(prayerTimes.maghrib));
        document.getElementById("isha-time").textContent = toArabicNumbers(formatTime(prayerTimes.isha));

        // دالة تنسيق الوقت لعرض الساعات والدقائق فقط مع نقطتين بينهما
        function formatTime(date) {
            const hours = date.getHours();
            const minutes = date.getMinutes();
            const displayHours = (hours % 12) || 12; // تحويل إلى نظام 12 ساعة
            const displayMinutes = minutes < 10 ? '0' + minutes : minutes;
            const ampm = hours >= 12 ? 'م' : 'ص'; // استبدال "صباحًا" بـ "ص" و"مساءً" بـ "م"
            return `${displayHours}:${displayMinutes} ${ampm}`;
        }

        // تحديث الوقت الفعلي بدون التاريخ
        function updateDateTime() {
            const currentDateTime = new Date();
            
            // الحصول على الوقت
            const hours = currentDateTime.getHours();
            const minutes = currentDateTime.getMinutes();
            const seconds = currentDateTime.getSeconds();
            const ampm = hours >= 12 ? 'مساءً' : 'صباحًا';
            
            // تحويل الساعات إلى نظام 12 ساعة
            const displayHours = hours % 12 || 12;
            const displayMinutes = minutes < 10 ? '0' + minutes : minutes;
            const displaySeconds = seconds < 10 ? '0' + seconds : seconds;
            
            // تنسيق الوقت فقط بدون التاريخ
            const formattedTime = `${displayHours}:${displayMinutes}:${displaySeconds} ${ampm}`;
            
            // تحويل الأرقام إلى الأرقام الهندية
            const formattedTimeArabic = toArabicNumbers(formattedTime);

            // تحديث النص
            document.getElementById("current-date-time").textContent = formattedTimeArabic;
        }

        // استدعاء الدالة عند التحميل وتحديث الوقت كل ثانية
        updateDateTime();
        setInterval(updateDateTime, 1000);
    });
</script>
</body>
</html>
