<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أوقات الصلاة</title>
    <link rel="icon" href="https://github.com/Ayadhost/Prayer-times/raw/main/favicon.png" type="image/png" sizes="32x32">
    <style>
        body {
            background-color: #121212;
            color: white;
            font-family: Arial, sans-serif;
            text-align: center;
            direction: rtl;
        }
        h1 {
            font-size: 2.5em;
            margin-bottom: 20px;
        }
        table {
            width: 50%;
            margin: 0 auto;
            border-collapse: separate;
            border-spacing: 0 15px;
        }
        td {
            padding: 15px;
            font-size: 1.5em;
            border-radius: 10px;
            background-color: #1e1e1e;
            box-shadow: 0 0 10px 2px rgba(255, 255, 255, 0.2);
        }
        .icon {
            width: 30px;
            height: 30px;
            vertical-align: middle;
        }
        #current-time {
            font-size: 1.2em;
            margin-top: 20px;
            margin-bottom: 30px;
        }
    </style>
</head>
<body>

    <h1>أوقات الصلاة في بغداد</h1>
    
    <div id="current-time"></div>

    <table>
        <tr>
            <td><img src="https://img.icons8.com/ios-filled/50/ffffff/alarm.png" class="icon" alt="Icon"> الفجر</td>
            <td>٤:٥١</td>
            <td>صباحًا</td>
        </tr>
        <tr>
            <td><img src="https://img.icons8.com/ios-filled/50/ffffff/alarm.png" class="icon" alt="Icon"> الظهر</td>
            <td>١١:٤٨</td>
            <td>صباحًا</td>
        </tr>
        <tr>
            <td><img src="https://img.icons8.com/ios-filled/50/ffffff/alarm.png" class="icon" alt="Icon"> المغرب</td>
            <td>٥:١٨</td>
            <td>مساءً</td>
        </tr>
    </table>

</body>
</html>
