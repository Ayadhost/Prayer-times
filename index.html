<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أوقات الصلاة في بغداد</title>
    <link rel="icon" href="favicon.png" type="image/png">
    <style>
        body {
            font-family: 'Arial', sans-serif;
            text-align: center;
            background-color: #1c1c1c;
            color: #ffffff;
            margin: 0;
            padding: 0;
        }
        h1 {
            margin: 20px 0;
            font-size: 2.5rem;
        }
        #current-date-time {
            font-size: 1.4rem;
            color: #bbbbbb;
            margin-bottom: 30px;
        }
        table {
            width: 70%;
            margin: 40px auto;
            border-collapse: collapse;
            background-color: #333;
            box-shadow: 0 4px 8px rgba(255, 255, 255, 0.2);
        }
        th, td {
            padding: 20px;
            text-align: center;
            border-bottom: 1px solid #444;
            font-size: 1.6rem;
            color: #ffffff;
        }
        td {
            position: relative;
            margin: 10px 0;
            background-color: #2c2c2c;
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            transition: transform 0.2s ease;
        }
        td:hover {
            transform: scale(1.05);
        }
        .icon {
            font-size: 2.5rem;
            color: #4CAF50;
        }
        td:last-child {
            color: #f0f0f0;
        }
    </style>
</head>
<body>

<h1>أوقات الصلاة في بغداد</h1>
<div id="current-date-time"></div>

<table>
    <tr>
        <td class="icon">🕒</td>
        <td>الفجر</td>
        <td id="fajr-time"></td>
        <td>صباحًا</td>
    </tr>
    <tr>
        <td class="icon">🕒</td>
        <td>الظهر</td>
        <td id="dhuhr-time"></td>
        <td>صباحًا</td>
    </tr>
    <tr>
        <td class="icon">🕒</td>
        <td>المغرب</td>
        <td id="maghrib-time"></td>
        <td>مساءً</td>
    </tr>
</table>

<script src="adhan.umd.min.js"></script>
<script>
document.addEventListener("DOMContentLoaded", function() {
    // ضبط الزوايا حسب المذهب الشيعي
    const params = adhan.CalculationMethod.MuslimWorldLeague();
    params.fajrAngle = 16;  // زاوية الفجر
    params.ishaAngle = 14;  // زاوية العشاء
    params.adjustments = { dhuhr: 0 };

    // حساب أوقات الصلاة باستخدام إحداثيات بغداد
    const prayerTimes = new adhan.PrayerTimes(
        new adhan.Coordinates(33.3152, 44.3661),  // إحداثيات بغداد
        new Date(),
        params
    );

    // تحويل الأرقام إلى الأرقام الهندية
    function toArabicNumbers(num) {
        return num.toString().replace(/\d/g, d => "٠١٢٣٤٥٦٧٨٩"[d]);
    }

    // تعيين أوقات الصلاة في الجدول
    document.getElementById("fajr-time").textContent = toArabicNumbers(prayerTimes.fajr.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }));
    document.getElementById("dhuhr-time").textContent = toArabicNumbers(prayerTimes.dhuhr.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }));
    document.getElementById("maghrib-time").textContent = toArabicNumbers(prayerTimes.maghrib.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }));

    // تحديث التاريخ والوقت الحالي
    function updateDateTime() {
        const currentDateTime = new Date();
        const day = currentDateTime.getDate();
        const month = currentDateTime.getMonth() + 1; // الشهور تبدأ من 0
        const year = currentDateTime.getFullYear();
        const hours = currentDateTime.getHours();
        const minutes = currentDateTime.getMinutes();
        const seconds = currentDateTime.getSeconds();
        const ampm = hours >= 12 ? 'مساءً' : 'صباحًا';

        // تنسيق الوقت ليظهر بالساعات والدقائق فقط
        const displayHours = hours % 12 || 12;
        const displayMinutes = minutes < 10 ? '0' + minutes : minutes;
        const displaySeconds = seconds < 10 ? '0' + seconds : seconds;

        // تنسيق التاريخ والوقت
        const formattedDateTime = `${toArabicNumbers(day)}-${toArabicNumbers(month)}-${toArabicNumbers(year)} ${toArabicNumbers(displayHours)}:${toArabicNumbers(displayMinutes)} ${ampm}`;

        // تحديث النص
        document.getElementById("current-date-time").textContent = formattedDateTime;
    }

    // تحديث التاريخ والوقت كل ثانية
    updateDateTime();
    setInterval(updateDateTime, 1000);
});
</script>

</body>
</html>
