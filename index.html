<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أوقات الصلاة في بغداد</title>
    <link rel="icon" href="favicon.png" type="image/png">
    <style>
        body {
            font-family: 'Arial', sans-serif;
            text-align: center;
            background-color: #1c1c1c;
            color: #ffffff;
            margin: 0;
            padding: 0;
        }
        h1 {
            margin: 20px 0;
            font-size: 2.5rem;
        }
        #current-date-time {
            font-size: 2rem; /* تكبير الخط */
            color: #bbbbbb;
            margin-bottom: 30px;
        }
        table {
            width: 70%;
            margin: 40px auto;
            border-collapse: collapse;
            background-color: #333;
            box-shadow: 0 4px 8px rgba(255, 255, 255, 0.2);
        }
        th, td {
            padding: 20px;
            text-align: center;
            border-bottom: 1px solid #444;
            font-size: 2rem; /* تكبير حجم النص في الحقول */
            color: #ffffff;
        }
        td {
            position: relative;
            margin: 10px 0;
            background-color: #2c2c2c;
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            transition: transform 0.2s ease;
        }
        td:hover {
            transform: scale(1.05);
        }
        .icon {
            font-size: 2.5rem;
            color: #4CAF50; /* لا تغيير في حجم الأيقونات */
        }
        td:last-child {
            color: #f0f0f0;
        }

        /* Media Query للهواتف لتوسيع المساحة وتقليل حجم النص */
        @media (max-width: 600px) {
            table {
                width: 90%; /* زيادة عرض الجدول */
            }
            th, td {
                font-size: 1.4rem; /* تقليل حجم النص قليلاً */
                padding: 15px; /* تقليل الحواف */
            }
            .icon {
                font-size: 2rem; /* تقليل حجم الأيقونات */
            }
        }

        /* تنسيق قائمة المحافظات */
        .location-select {
            margin: 20px auto;
            font-size: 1.6rem;
            padding: 10px;
            width: 50%;
        }

        label {
            font-size: 1.8rem;
            color: #ffffff;
        }
    </style>
</head>
<body>

<h1>أوقات الصلاة في بغداد</h1>
<div id="current-date-time"></div> <!-- حقل عرض الوقت الفعلي -->

<table>
    <tr>
        <td class="icon">🕒</td>
        <td>الفجر</td>
        <td id="fajr-time"></td>
    </tr>
    <tr>
        <td class="icon">🕒</td>
        <td>الشروق</td>
        <td id="sunrise-time"></td>
    </tr>
    <tr>
        <td class="icon">🕒</td>
        <td>الظهر</td>
        <td id="dhuhr-time"></td>
    </tr>
    <tr>
        <td class="icon">🕒</td>
        <td>الغروب</td>
        <td id="maghrib-time"></td>
    </tr>
    <tr>
        <td class="icon">🕒</td>
        <td>العشاء</td>
        <td id="isha-time"></td>
    </tr>
</table>

<!-- قائمة اختيار المحافظة -->
<label for="location">حدد المحافظة:</label>
<select id="location" class="location-select">
    <option value="33.3152,44.3661">بغداد</option>
    <option value="31.9985,44.3356">كربلاء</option>
    <option value="32.0351,44.3626">النجف</option>
    <option value="32.4646,45.9392">الديوانية</option>
    <option value="36.335,43.1189">الموصل</option>
    <option value="30.5085,47.7814">البصرة</option>
    <option value="33.325,44.65">بابل</option>
    <option value="32.492,44.426">الناصرية</option>
    <option value="34.636,43.672">الأنبار</option>
    <option value="31.431,47.701">ميسان</option>
    <option value="34.192,43.874">صلاح الدين</option>
    <option value="36.19,44.01">أربيل</option>
    <option value="35.468,45.403">السليمانية</option>
    <option value="37.097,42.784">دهوك</option>
    <option value="35.551,44.356">كركوك</option>
    <option value="32.469,45.876">المثنى</option>
</select>

<script src="adhan.umd.min.js"></script>
<script>
    document.addEventListener("DOMContentLoaded", function() {
        const locationSelect = document.getElementById("location");
        let coordinates = new adhan.Coordinates(33.3152, 44.3661); // إحداثيات بغداد

        // إعدادات حساب الصلاة مع الزوايا
        const params = adhan.CalculationMethod.Other(); 
        params.fajrAngle = 18; // زاوية الفجر للمذهب الجعفري
        params.ishaAngle = 4; // زاوية العشاء للمذهب الجعفري

        function updatePrayerTimes(coordinates) {
            const date = new Date();
            const prayerTimes = new adhan.PrayerTimes(coordinates, date, params);

            // تحويل الأرقام إلى الأرقام الهندية
            function toArabicNumbers(num) {
                return num.replace(/\d/g, d => "٠١٢٣٤٥٦٧٨٩"[d]);
            }

            // عرض أوقات الصلاة في العناصر المناسبة بدون الثواني وبدون صباحًا/مساءً
            document.getElementById("fajr-time").textContent = toArabicNumbers(formatTimeWithoutAmPm(prayerTimes.fajr));
            document.getElementById("sunrise-time").textContent = toArabicNumbers(formatTimeWithoutAmPm(prayerTimes.sunrise));
            document.getElementById("dhuhr-time").textContent = toArabicNumbers(formatTimeWithoutAmPm(prayerTimes.dhuhr));
            document.getElementById("maghrib-time").textContent = toArabicNumbers(formatTimeWithoutAmPm(prayerTimes.maghrib));
            document.getElementById("isha-time").textContent = toArabicNumbers(formatTimeWithoutAmPm(prayerTimes.isha));

            // دالة تنسيق الوقت بدون صباحًا/مساءً وبدون الثواني
            function formatTimeWithoutAmPm(date) {
                const hours = date.getHours();
                const minutes = date.getMinutes();
                const displayHours = (hours % 12) || 12; // تحويل إلى نظام 12 ساعة
                const displayMinutes = minutes < 10 ? '0' + minutes : minutes;
                return `${displayHours}:${displayMinutes}`;
            }
        }

        // تحديث أوقات الصلاة عند تغيير المحافظة
        locationSelect.addEventListener("change", function() {
            const [lat, lon] = this.value.split(",");
            coordinates = new adhan.Coordinates(parseFloat(lat), parseFloat(lon));
            updatePrayerTimes(coordinates);

            // تحديث العنوان ليعكس اسم المحافظة المحددة
            document.querySelector("h1").textContent = "أوقات الصلاة في " + this.options[this.selectedIndex].text;
        });

        // استدعاء أوقات الصلاة عند التحميل
        updatePrayerTimes(coordinates);

        // تحديث الوقت الحالي فقط مع الثواني وعرض صباحًا/مساءً
        function updateCurrentDateTime() {
            const now = new Date();
            const hours = now.getHours();
            const minutes = now.getMinutes();
            const seconds = now.getSeconds();
            const displayHours = (hours % 12) || 12; // تحويل إلى نظام 12 ساعة
            const displayMinutes = minutes < 10 ? '0' + minutes : minutes;
            const displaySeconds = seconds < 10 ? '0' + seconds : seconds;
            const ampm = hours >= 12 ? 'مساءً' : 'صباحًا'; // استبدال "مساءً" أو "صباحًا"
            document.getElementById("current-date-time").textContent = `${displayHours}:${displayMinutes}:${displaySeconds} ${ampm}`;
        }

        // تحديث الوقت كل ثانية
        setInterval(updateCurrentDateTime, 1000);
    });
</script>

</body>
</html>
